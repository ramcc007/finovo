name: Seed Companies (NSE master list)

on:
  schedule:
    # Weekly refresh of the listed-company universe — Sunday 5:00 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:  # allow manual trigger (run this FIRST to seed the universe)

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Seed companies
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/ingest_companies.py
