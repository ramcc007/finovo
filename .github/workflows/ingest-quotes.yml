name: Live Quote Update

on:
  schedule:
    # Every 5 min, Mon–Fri, 03:45–10:05 UTC (= 9:15 AM–3:35 PM IST)
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

# A late-starting run overlapping the next one would double-hit NSE and
# race on the same upserts — cancel the older run instead.
concurrency:
  group: live-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    # curl_cffi's Chrome TLS impersonation does a real handshake per request
    # instead of the near-instant 404 the old plain-requests client got from
    # NSE's bot detection — genuine fetches take meaningfully longer, so the
    # old 7-minute budget (sized for fast-fail) is too tight for 4 real passes.
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch live quotes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # 4 passes ~60s apart per 5-min cron tick ≈ 60–75s effective freshness.
          LOOP_COUNT: '4'
          LOOP_INTERVAL: '60'
          # Unbuffered stdout — Python fully buffers non-tty output by
          # default, so a run killed by a timeout or cancellation (as
          # happened diagnosing this exact job) shows zero log output
          # instead of whatever progress was actually made.
          PYTHONUNBUFFERED: '1'
        run: python scripts/ingest_quotes.py
