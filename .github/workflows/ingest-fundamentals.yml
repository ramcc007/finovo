name: Weekly Fundamental Ingestion

on:
  schedule:
    # Every Sunday at 08:00 UTC (1:30 PM IST)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      max_symbols:
        description: 'Max symbols to process (use a small number to test)'
        required: false
        default: '2000'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # can take up to 6h for all 5000 stocks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run fundamental ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAX_SYMBOLS: ${{ github.event.inputs.max_symbols || '5000' }}
        run: python scripts/ingest_fundamentals.py
