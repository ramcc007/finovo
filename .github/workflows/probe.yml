name: Probe Production URL

# Temporary diagnostic: the dev sandbox cannot reach vercel.app, so this
# workflow acts as an HTTP probe to inspect what production actually serves.
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to probe'
        required: false
        default: 'https://finovo-rcc.vercel.app/stocks/ICICIBANK'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch URL (headers + body preview)
        run: |
          URL="${{ inputs.url || 'https://finovo-rcc.vercel.app/stocks/ICICIBANK' }}"
          echo "== HTTP/2 =="
          curl -s -o /tmp/body.html -D /tmp/headers.txt -w 'status=%{http_code} time=%{time_total}s size=%{size_download}\n' "$URL" || echo "curl exit: $?"
          echo "== response headers =="
          cat /tmp/headers.txt
          echo "== body first 2000 bytes =="
          head -c 2000 /tmp/body.html; echo
          echo "== HTTP/1.1 retry =="
          curl -s --http1.1 -o /dev/null -w 'status=%{http_code}\n' "$URL" || echo "curl exit: $?"
          echo "== homepage =="
          curl -s -o /dev/null -w 'status=%{http_code}\n' "https://finovo-rcc.vercel.app/" || echo "curl exit: $?"
          echo "== api =="
          curl -s -w '\nstatus=%{http_code}\n' "https://finovo-rcc.vercel.app/api/stocks/ICICIBANK" | head -c 1500
