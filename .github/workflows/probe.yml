name: Probe Production URL

# Temporary diagnostic: the dev sandbox cannot reach vercel.app, so this
# workflow acts as an HTTP + real-browser probe against production.
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to probe'
        required: false
        default: 'https://finovo-rcc.vercel.app/stocks/ICICIBANK'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fetch URL (headers + body preview)
        run: |
          URL="${{ inputs.url || 'https://finovo-rcc.vercel.app/stocks/ICICIBANK' }}"
          curl -s -o /tmp/body.html -D /tmp/headers.txt -w 'status=%{http_code} time=%{time_total}s size=%{size_download}\n' "$URL" || echo "curl exit: $?"
          cat /tmp/headers.txt

      - name: Headless Chrome navigation (real browser fidelity)
        env:
          URL: ${{ inputs.url || 'https://finovo-rcc.vercel.app/stocks/ICICIBANK' }}
        run: |
          npm init -y > /dev/null
          npm i --no-audit --no-fund playwright > /dev/null 2>&1
          node - <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            // Use the runner's preinstalled Google Chrome — same engine the user runs.
            const b = await chromium.launch({ channel: 'chrome' });
            const p = await b.newPage();
            const events = [];
            p.on('console', m => { if (m.type() === 'error') events.push('console-error: ' + m.text()); });
            p.on('pageerror', e => events.push('pageerror: ' + e.message));
            p.on('requestfailed', r => events.push('requestfailed: ' + r.url() + ' -> ' + (r.failure() || {}).errorText));
            p.on('response', r => { if (r.status() >= 400) events.push('http ' + r.status() + ': ' + r.url()); });
            try {
              const resp = await p.goto(process.env.URL, { waitUntil: 'load', timeout: 30000 });
              console.log('NAV OK — document status:', resp && resp.status());
              await p.waitForTimeout(8000);
              console.log('title:', await p.title());
              const text = await p.evaluate(() => document.body.innerText);
              console.log('rendered text (first 400 chars):', JSON.stringify(text.slice(0, 400)));
            } catch (e) {
              console.log('NAVIGATION FAILED:', e.message);
            }
            console.log('--- events ---');
            for (const ev of events) console.log(ev);
            await b.close();
          })();
          EOF
